name: Preview Screenshots

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Take screenshots
        run: |
          mkdir -p screenshots
          npx -y playwright install --with-deps chromium
          npx serve ./out -l 3000 &
          sleep 4
          npx playwright screenshot --browser chromium --viewport-size 1440,900 --full-page http://localhost:3000 screenshots/home-full.png
          npx playwright screenshot --browser chromium --viewport-size 1440,900 --full-page http://localhost:3000/founder-diagnostic screenshots/founder-verdict-full.png
          npx playwright screenshot --browser chromium --viewport-size 1440,900 http://localhost:3000 screenshots/home-above-fold.png
          npx playwright screenshot --browser chromium --viewport-size 1440,900 http://localhost:3000/founder-diagnostic screenshots/founder-verdict-above-fold.png

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: page-screenshots
          path: screenshots/
          retention-days: 14

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `**Preview screenshots ready** → [Download from Actions](${runUrl})\n\nCaptures: \`home\` and \`founder-verdict\` (full page + above the fold)`
            });
