name: Preview Screenshots

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Take screenshots
        run: |
          mkdir -p screenshots
          npx -y playwright install --with-deps chromium
          npx serve ./out -l 3000 &
          sleep 4
          npx playwright screenshot --browser chromium --viewport-size 1440,900 --wait-for-timeout 5000 --full-page http://localhost:3000 screenshots/home-full.png
          npx playwright screenshot --browser chromium --viewport-size 1440,900 --wait-for-timeout 5000 --full-page http://localhost:3000/founder-diagnostic screenshots/founder-verdict-full.png
          npx playwright screenshot --browser chromium --viewport-size 1440,900 --wait-for-timeout 5000 http://localhost:3000 screenshots/home-above-fold.png
          npx playwright screenshot --browser chromium --viewport-size 1440,900 --wait-for-timeout 5000 http://localhost:3000/founder-diagnostic screenshots/founder-verdict-above-fold.png
          npx playwright screenshot --browser chromium --viewport-size 1440,900 --wait-for-timeout 5000 --full-page http://localhost:3000/d/diagnostic-handout screenshots/handout-full.png
          npx playwright screenshot --browser chromium --viewport-size 1440,900 --wait-for-timeout 5000 http://localhost:3000/d/diagnostic-handout screenshots/handout-above-fold.png

      - name: Publish screenshots to branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: pr-screenshots
          publish_dir: ./screenshots
          destination_dir: pr-${{ github.event.pull_request.number }}
          keep_files: true

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.issue.number;
            const base = `https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/pr-screenshots/pr-${pr}`;
            const marker = '<!-- preview-screenshots -->';
            const body = [
              marker,
              '**Preview screenshots**',
              '',
              '| | Full page | Above fold |',
              '|---|---|---|',
              `| Home | ![](${base}/home-full.png) | ![](${base}/home-above-fold.png) |`,
              `| Diagnostic | ![](${base}/founder-verdict-full.png) | ![](${base}/founder-verdict-above-fold.png) |`,
              `| Handout (/d/diagnostic-handout) | ![](${base}/handout-full.png) | ![](${base}/handout-above-fold.png) |`,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: pr, owner: context.repo.owner, repo: context.repo.repo,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: pr, owner: context.repo.owner, repo: context.repo.repo, body,
              });
            }
