name: Preview Screenshots

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Take screenshots
        run: |
          mkdir -p screenshots
          npx serve ./out -l 3000 &
          sleep 4
          node << 'EOF'
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            await page.setViewportSize({ width: 1440, height: 900 });
            const pages = [
              { url: 'http://localhost:3000', name: 'home' },
              { url: 'http://localhost:3000/founder-diagnostic', name: 'founder-verdict' },
            ];
            for (const { url, name } of pages) {
              await page.goto(url, { waitUntil: 'networkidle' });
              await page.screenshot({ path: `screenshots/${name}-full.png`, fullPage: true });
              await page.screenshot({ path: `screenshots/${name}-above-fold.png`, fullPage: false });
            }
            await browser.close();
          })();
          EOF

      - name: Upload screenshots
        uses: actions/upload-artifact@v3
        with:
          name: page-screenshots
          path: screenshots/
          retention-days: 14

      - name: Comment on PR
        uses: actions/github-script@v6
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `**Preview screenshots ready** → [Download from Actions](${runUrl})\n\nCaptures: \`home\` and \`founder-verdict\` (full page + above the fold)`
            });
